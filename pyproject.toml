[project]
name = "ai-plays-slay-the-spire"
version = "0.0.0"
description = "AI plays Slay the Spire"
readme = "README.md"
requires-python = ">=3.11"

[dependency-groups]
dev = ["pyright>=1.1.408", "ruff>=0.15.5"]

[tool.uv.workspace]
members = ["packages/*"]

[tool.pyright]
typeCheckingMode = "strict"
reportImplicitOverride = true

[tool.ruff]
target-version = "py311"

[tool.ruff.lint]
select = ["ALL"]
ignore = ["D", "EM101", "EM102", "TRY003"]
